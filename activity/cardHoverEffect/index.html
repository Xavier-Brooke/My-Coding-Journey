<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cardHoverEffect</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Card Hover Effect</h1>
    <div class="container">

        <div class="card">
            <img src="./assests/man.jpg" alt="manImg" id="img1" class="img">
            <div class="description">
                <p><span>Rahul Kumar</span>&emsp;<span>Software Developer</span></p>
            </div>
        </div>

        <div class="card">
            <img src="./assests/woman.jpg" alt="womanImg" id="img2" class="img">
            <div class="description">
                <p><span>Neha Sharma</span>&emsp;<span>Data Analyst</span></p>
            </div>
        </div>

    </div>
</body>
</html>
