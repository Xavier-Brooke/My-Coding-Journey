<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formTag</title>
</head>
<body>
    <form action="">
        
        <section class="name">
            <label for="firstName">Enter your first name :- </label>
            <input id="firstName" type="text" required minlength="3" maxlength="20" placeholder="Enter your first name here!">
            <br><br>
            <label for="lastName">Enter your last name :- </label>
            <input id="lastName" type="text" minlength="3" maxlength="20" placeholder="Enter your last name here!">
            <br><br>
        </section>

        <section class="age">
            <label for="age">Enter your age :- </label>
            <input type="number" id="age" required min="15" max="60" step="1">
            <br><br>
        </section>

        <section class="class">
            <label>Select your class :- </label>
            <input type="radio" id="IX" name="class" value="IX">
            <label for="IX">IX</label>
            &nbsp;&nbsp;&nbsp;
            <input type="radio" name="class" id="X" value="X">
            <label for="X">X</label>
            &nbsp;&nbsp;&nbsp;
            <input type="radio" name="class" id="XI" value="XI">
            <label for="XI">XI</label>
            &nbsp;&nbsp;&nbsp;
            <input type="radio" name="class" id="XII" value="XII">
            <label for="XII">XII</label>
            &nbsp;&nbsp;&nbsp;
            <br><br>
        </section>

        <section class="subjects">
            <p>Choose your subjects from below :- </p>
            <input type="checkbox" name="subjects" value="maths" id="maths">
            <label for="maths">Maths</label>
            &nbsp;&nbsp;&nbsp;
            <input type="checkbox" name="subjects" value="physics" id="physics">
            <label for="physics">Physics</label>
            &nbsp;&nbsp;&nbsp;
            <input type="checkbox" name="subjects" value="chemistry" id="chemistry">
            <label for="chemistry">Chemistry</label>
            &nbsp;&nbsp;&nbsp;
            <input type="checkbox" name="subjects" value="english" id="english">
            <label for="english">English</label>
            &nbsp;&nbsp;&nbsp;
            <input type="checkbox" name="subjects" value="urdu" id="urdu">
            <label for="urdu">Urdu</label>
            &nbsp;&nbsp;&nbsp;
            <input type="checkbox" name="subjects" value="optional" id="optional">
            <label for="optional">Optional</label>
            &nbsp;&nbsp;&nbsp;
            <br><br>
        </section>

        <section class="city">
            <select name="city" id="city">
                <option value="Mumbai">Mumbai</option>
                <option value="New Delhi">New Delhi</option>
                <option value="Banglore">Banglore</option>
                <option value="Patna">Patna</option>
                <option value="Kolkata">Kolkata</option>
            </select>
            <br><br>
        </section>

        <section class="feedback">
            <textarea name="feedback" id="feedback" rows="5" cols="45" placeholder="Enter your important feedback here!"></textarea>
        </section>
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
