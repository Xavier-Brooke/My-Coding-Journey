<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tableTag</title>
</head>
<body>
    <table border="black" style="text-align: center;">
        <caption>A test table with merged cells</caption>
        <tr>
            <th rowspan="2"></th>
            <th colspan="2">Average</th>
            <th rowspan="2">Red Eyes</th>
        </tr>
        <tr>
            <th>Height</th>
            <th>Weight</th>
        </tr>
        <tr>
            <td>Male</td>
            <td>5.8</td>
            <td>78</td>
            <td>60&percnt;</td>
        </tr>
        <tr>
            <td>Female</td>
            <td>5.3</td>
            <td>66</td>
            <td>70&percnt;</td>
        </tr>
    </table>
</body>
</html>
